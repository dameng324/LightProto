name: Publish LightProto.CodeGen

on:
  push:
    tags:
      - 'protogen-v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          dotnet-version: '9.0.x'

      - name: Verify tag points to main
        if: github.event_name != 'workflow_dispatch'
        run: |
          TAG_COMMIT=$(git rev-list -n 1 $GITHUB_REF)
          if git merge-base --is-ancestor $TAG_COMMIT origin/main; then
            echo "✅ Tag $GITHUB_REF is based on main"
          else
            echo "❌ Tag $GITHUB_REF is not based on main"
            exit 1
          fi

      - name: Check format
        run: dotnet tool restore && dotnet tool run csharpier check .

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --configuration Release

      - name: Run CodeGen tests
        run: dotnet test --project tests/LightProto.ProtoGen.Tests/ --configuration Release --no-build --verbosity normal

      - name: Resolve version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          GIT_REF: ${{ github.ref }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            VERSION="$INPUT_VERSION"
          elif [[ "$GIT_REF" == refs/tags/protogen-v* ]]; then
            VERSION="$REF_NAME"
            VERSION="${VERSION#protogen-v}"
          else
            VERSION="not-valid-version"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Pack LightProto.CodeGen
        run: |
          dotnet pack src/LightProto.ProtoGen/LightProto.ProtoGen.csproj \
            --configuration Release \
            --output ./packages \
            -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Publish to NuGet
        run: |
          dotnet nuget push ./packages/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/protogen-v')
        with:
          name: 'LightProto.CodeGen V${{ steps.version.outputs.VERSION }}'
          generate_release_notes: true
          draft: false
          files: ./packages/*.nupkg
